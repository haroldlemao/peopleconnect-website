<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0F172A"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <!-- Orange glow top-right -->
    <radialGradient id="glow" cx="85%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue glow bottom-left -->
    <radialGradient id="glow2" cx="15%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#1B4FD8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1B4FD8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo mark — two overlapping circles, white dot -->
  <circle cx="156" cy="315" r="90" fill="#1B4FD8"/>
  <circle cx="276" cy="315" r="90" fill="#1B4FD8"/>
  <!-- Overlap darkening -->
  <clipPath id="left-circle">
    <circle cx="156" cy="315" r="90"/>
  </clipPath>
  <circle cx="276" cy="315" r="90" fill="#0F35B8" clip-path="url(#left-circle)"/>
  <!-- White centre dot -->
  <circle cx="216" cy="315" r="26" fill="white"/>

  <!-- Company name -->
  <text x="390" y="290" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2" fill="white">PeopleConnect<tspan fill="#F97316">ZA</tspan></text>

  <!-- Divider -->
  <rect x="390" y="318" width="720" height="3" rx="2" fill="rgba(255,255,255,0.15)"/>

  <!-- Tagline -->
  <text x="392" y="380" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="34" font-weight="400" fill="rgba(255,255,255,0.65)" letter-spacing="0.5">
    EngageZA  ·  SmallBiz Web
  </text>

  <!-- Sub-tagline -->
  <text x="392" y="430" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="rgba(255,255,255,0.38)" letter-spacing="0.3">
    Digital tools for South African organisations
  </text>

  <!-- Domain badge -->
  <rect x="390" y="490" width="310" height="52" rx="26" fill="rgba(27,79,216,0.25)" stroke="rgba(27,79,216,0.5)" stroke-width="1.5"/>
  <text x="545" y="523" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="22" font-weight="600" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="0.5">
    peopleconnect.co.za
  </text>
</svg>
